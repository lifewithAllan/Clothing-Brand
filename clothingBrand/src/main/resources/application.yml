spring:
  application:
      name:clothingBrand
  datasource:
    url: jdbc:postgresql://localhost:5432/clothingBrand
    username: postgres
    password: password
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${SPRING_MAIL_USERNAME}
    password: ${SPRING_MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls.enable: true

server:
  port: 8080

jwt:
  secret: changeit_to_a_long_random_secret_in_prod
  accessTokenExpirationMinutes: 15
  refreshTokenExpirationDays: 14

app:
  email:
    from: "no-reply@example.com"
    logo-url: "http://localhost:8080/feelhouette-logo.jpg"

loki:
  endpoint: http://easyshop-loki:3100

logging:
  pattern:
    file: "%d{yyyy-MM-dd HH:mm:ss} %-5level [%thread] %logger{36} - %msg%n"
  level:
    root: INFO
    org.springframework.web: DEBUG